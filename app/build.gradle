plugins {
    id 'com.android.application'
}

android {
    namespace 'com.verusmine'

    compileSdk 34

    defaultConfig {
        applicationId "com.verusmine"
        minSdk 26
        targetSdk 34

        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        debug {
            debuggable true
        }

        release {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']  // this ensures your prebuilt .so files are included
        }
    }

    packagingOptions {
        doNotStrip "**/*.so"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
